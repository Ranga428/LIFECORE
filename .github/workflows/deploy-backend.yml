name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to Railway
        if: false  # Enable when Railway project is set up
        run: |
          echo "Deploying to Railway..."
          # railway deploy --token ${{ secrets.RAILWAY_TOKEN }} || true

      - name: Deploy to Render
        if: false  # Enable when Render project is set up
        run: |
          echo "Deploying to Render..."
          # Render deployment hooks would go here